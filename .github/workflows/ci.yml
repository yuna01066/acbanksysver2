name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Pricing regression tests
        run: node scripts/test-price-calculations.mjs

      - name: Verify DB migration state (staging)
        if: ${{ env.PGHOST != '' }}
        env:
          PGHOST: ${{ secrets.STAGING_PGHOST }}
          PGPORT: ${{ secrets.STAGING_PGPORT }}
          PGUSER: ${{ secrets.STAGING_PGUSER }}
          PGPASSWORD: ${{ secrets.STAGING_PGPASSWORD }}
          PGDATABASE: ${{ secrets.STAGING_PGDATABASE }}
          CI_STRICT_DB_VERIFY: "1"
        run: npm run verify:db-migrations

      - name: Build
        run: npm run build
