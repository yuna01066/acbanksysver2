name: Deploy Quote Wizard Worker to Cloud Run

on:
  workflow_dispatch:
    inputs:
      region:
        description: Google Cloud region
        required: true
        default: asia-northeast3
      service_name:
        description: Cloud Run service name
        required: true
        default: acbank-quote-wizard-worker
      repository:
        description: Artifact Registry repository
        required: true
        default: acbank-workers

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ inputs.region }}
      SERVICE_NAME: ${{ inputs.service_name }}
      REPOSITORY: ${{ inputs.repository }}
      IMAGE_TAG: ${{ github.sha }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
      QUOTE_WIZARD_WORKER_SECRET: ${{ secrets.QUOTE_WIZARD_WORKER_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate required secrets
        run: |
          test -n "$PROJECT_ID" || { echo "Missing repository secret GCP_PROJECT_ID"; exit 1; }
          test -n "$GCP_SA_KEY" || { echo "Missing repository secret GCP_SA_KEY"; exit 1; }
          test -n "$QUOTE_WIZARD_WORKER_SECRET" || { echo "Missing repository secret QUOTE_WIZARD_WORKER_SECRET"; exit 1; }
          if [[ -z "$LOVABLE_API_KEY" ]]; then
            echo "LOVABLE_API_KEY is not set; deploying worker without AI Gateway."
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Enable Secret Manager
        run: |
          gcloud services enable secretmanager.googleapis.com --project "$PROJECT_ID"

      - name: Sync worker secrets to Google Secret Manager
        run: |
          sync_secret() {
            local name="$1"
            local value="$2"
            if gcloud secrets describe "$name" --project "$PROJECT_ID" >/dev/null 2>&1; then
              printf '%s' "$value" | gcloud secrets versions add "$name" --data-file=- --project "$PROJECT_ID"
            else
              printf '%s' "$value" | gcloud secrets create "$name" --data-file=- --project "$PROJECT_ID"
            fi
          }

          if [[ -n "$LOVABLE_API_KEY" ]]; then
            sync_secret LOVABLE_API_KEY "$LOVABLE_API_KEY"
          else
            echo "Skipping LOVABLE_API_KEY Secret Manager sync."
          fi
          sync_secret QUOTE_WIZARD_WORKER_SECRET "$QUOTE_WIZARD_WORKER_SECRET"

      - name: Deploy worker
        run: scripts/deploy-quote-wizard-worker-cloud-run.sh

      - name: Verify worker health
        run: |
          SERVICE_URL="$(gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')"
          scripts/verify-quote-wizard-worker.sh "$SERVICE_URL"
          echo "Set Lovable QUOTE_WIZARD_WORKER_URL=${SERVICE_URL}/analyze"
