
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판재 단가 계산기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f9fafb;
            padding: 20px;
        }

        .calculator-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: #3b82f6;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .content {
            padding: 24px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            gap: 8px;
        }

        .step {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            background: #e5e7eb;
            color: #6b7280;
        }

        .step.active {
            background: #3b82f6;
            color: white;
        }

        .step-line {
            width: 32px;
            height: 2px;
            background: #e5e7eb;
        }

        .step-line.active {
            background: #3b82f6;
        }

        .selection-summary {
            background: #f9fafb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .selection-summary h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .selection-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .badge {
            background: #e5e7eb;
            color: #374151;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid #d1d5db;
        }

        .step-content h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .button-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .button-grid.grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .button-grid.grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .button-grid.grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .option-button {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .option-button:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .option-button.selected {
            border-color: #3b82f6;
            background: #3b82f6;
            color: white;
        }

        .result-box {
            background: #ecfdf5;
            border: 2px solid #10b981;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
        }

        .result-box h4 {
            color: #065f46;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-box p {
            color: #047857;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .result-price {
            color: #065f46;
            font-size: 18px;
            font-weight: bold;
        }

        .back-button {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .back-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 14px;
            padding: 8px 16px;
        }

        .back-btn:hover {
            color: #374151;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="header">
            <h1>판재 단가 계산기</h1>
        </div>
        
        <div class="content">
            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step active" id="step-1">1</div>
                <div class="step-line" id="line-1"></div>
                <div class="step" id="step-2">2</div>
                <div class="step-line" id="line-2"></div>
                <div class="step" id="step-3">3</div>
                <div class="step-line" id="line-3"></div>
                <div class="step" id="step-4">4</div>
                <div class="step-line" id="line-4"></div>
                <div class="step" id="step-5">5</div>
            </div>

            <!-- Selection Summary -->
            <div class="selection-summary">
                <h3>선택 내역</h3>
                <div id="summary-content">
                    <p>선택된 옵션이 없습니다.</p>
                </div>
            </div>

            <!-- Step 1: 소재 선택 -->
            <div class="step-content" id="content-1">
                <h3>1. 소재를 선택해주세요</h3>
                <div class="button-grid grid-3">
                    <button class="option-button" onclick="selectMaterial('casting', '캐스팅')">캐스팅</button>
                    <button class="option-button" onclick="selectMaterial('extrusion', '압출')">압출</button>
                    <button class="option-button" onclick="selectMaterial('acrylic-mirror', '아크릴 미러')">아크릴 미러</button>
                    <button class="option-button" onclick="selectMaterial('format', '포마트')">포마트</button>
                    <button class="option-button" onclick="selectMaterial('abs', 'ABS')">ABS</button>
                    <button class="option-button" onclick="selectMaterial('pc', 'PC')">PC</button>
                    <button class="option-button" onclick="selectMaterial('a-pet', 'A-PET')">A-PET</button>
                </div>
            </div>

            <!-- Step 2: 재질 선택 -->
            <div class="step-content hidden" id="content-2">
                <h3>2. 재질을 선택해주세요</h3>
                <div class="button-grid grid-2">
                    <button class="option-button" onclick="selectQuality('glossy-color', '유광 색상판')">유광 색상판</button>
                    <button class="option-button" onclick="selectQuality('astel-color', '아스텔 색상판')">아스텔 색상판</button>
                    <button class="option-button" onclick="selectQuality('satin-color', '사틴 색상판')">사틴 색상판</button>
                    <button class="option-button" onclick="selectQuality('glossy-standard', '유광 보급판')">유광 보급판</button>
                    <button class="option-button" onclick="selectQuality('astel-standard', '아스텔 보급판')">아스텔 보급판</button>
                    <button class="option-button" onclick="selectQuality('satin-standard', '사틴 보급판')">사틴 보급판</button>
                </div>
            </div>

            <!-- Step 3: 두께 선택 -->
            <div class="step-content hidden" id="content-3">
                <h3>3. 두께를 선택해주세요</h3>
                <div class="button-grid grid-4">
                    <button class="option-button" onclick="selectThickness('1.3T')">1.3T</button>
                    <button class="option-button" onclick="selectThickness('1.5T')">1.5T</button>
                    <button class="option-button" onclick="selectThickness('2T')">2T</button>
                    <button class="option-button" onclick="selectThickness('3T')">3T</button>
                    <button class="option-button" onclick="selectThickness('4T')">4T</button>
                    <button class="option-button" onclick="selectThickness('5T')">5T</button>
                    <button class="option-button" onclick="selectThickness('8T')">8T</button>
                    <button class="option-button" onclick="selectThickness('10T')">10T</button>
                    <button class="option-button" onclick="selectThickness('12T')">12T</button>
                    <button class="option-button" onclick="selectThickness('20T')">20T</button>
                    <button class="option-button" onclick="selectThickness('25T')">25T</button>
                    <button class="option-button" onclick="selectThickness('30T')">30T</button>
                </div>
            </div>

            <!-- Step 4: 사이즈 선택 -->
            <div class="step-content hidden" id="content-4">
                <h3>4. 판재 사이즈를 선택해주세요</h3>
                <div class="button-grid grid-3" id="size-buttons">
                    <!-- 동적으로 생성됩니다 -->
                </div>
            </div>

            <!-- Step 5: 면수 선택 -->
            <div class="step-content hidden" id="content-5">
                <h3>5. 면수를 선택해주세요</h3>
                <div class="button-grid grid-2">
                    <button class="option-button" onclick="selectSurface('single', '단면')">단면</button>
                    <button class="option-button" onclick="selectSurface('double', '양면')">양면</button>
                </div>
            </div>

            <!-- 결과 표시 -->
            <div class="result-box hidden" id="result-box">
                <h4>계산 완료!</h4>
                <p>선택하신 옵션으로 단가 계산이 완료되었습니다.</p>
                <div class="result-price">예상 단가: 계산 중... (가격 로직 추가 필요)</div>
            </div>

            <!-- 이전 단계 버튼 -->
            <div class="back-button hidden" id="back-button">
                <button class="back-btn" onclick="goBack()">← 이전 단계로</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let selections = {
            material: null,
            materialName: '',
            quality: null,
            qualityName: '',
            thickness: '',
            size: '',
            surface: null,
            surfaceName: ''
        };

        const sizeOptions = {
            'glossy-color': ['3*6', '대3*6', '4*5', '대4*5', '1*2', '4*6', '4*8', '5*5', '5*6', '5*8'],
            'glossy-standard': ['3*6', '대3*6', '4*5', '대4*5', '1*2', '4*6', '4*8', '5*5', '5*6', '5*8'],
            'astel-color': ['소3*6', '대3*6', '4*5', '대4*5', '소1*2', '1*2', '4*6', '4*8', '5*8'],
            'astel-standard': ['소3*6', '대3*6', '4*5', '대4*5', '소1*2', '1*2', '4*6', '4*8', '5*8'],
            'satin-color': ['대3*6', '1*2', '4*8'],
            'satin-standard': ['3*6', '대3*6', '4*5', '대4*5', '1*2', '4*6', '4*8', '5*5', '5*6', '5*8']
        };

        function updateStepIndicator() {
            for (let i = 1; i <= 5; i++) {
                const step = document.getElementById(`step-${i}`);
                const line = document.getElementById(`line-${i}`);
                
                if (i <= currentStep) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
                
                if (line && i < currentStep) {
                    line.classList.add('active');
                } else if (line) {
                    line.classList.remove('active');
                }
            }
        }

        function updateSummary() {
            const summaryContent = document.getElementById('summary-content');
            let html = '';
            
            if (selections.materialName) {
                html += `<div class="selection-item"><span class="badge">소재</span><span>${selections.materialName}</span></div>`;
            }
            if (selections.qualityName) {
                html += `<div class="selection-item"><span class="badge">재질</span><span>${selections.qualityName}</span></div>`;
            }
            if (selections.thickness) {
                html += `<div class="selection-item"><span class="badge">두께</span><span>${selections.thickness}</span></div>`;
            }
            if (selections.size) {
                html += `<div class="selection-item"><span class="badge">사이즈</span><span>${selections.size}</span></div>`;
            }
            if (selections.surfaceName) {
                html += `<div class="selection-item"><span class="badge">면수</span><span>${selections.surfaceName}</span></div>`;
            }
            
            summaryContent.innerHTML = html || '<p>선택된 옵션이 없습니다.</p>';
        }

        function showStep(step) {
            // Hide all step contents
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`content-${i}`).classList.add('hidden');
            }
            
            // Show current step content
            document.getElementById(`content-${step}`).classList.remove('hidden');
            
            // Show/hide back button
            const backButton = document.getElementById('back-button');
            if (step > 1) {
                backButton.classList.remove('hidden');
            } else {
                backButton.classList.add('hidden');
            }
            
            updateStepIndicator();
        }

        function selectMaterial(materialId, materialName) {
            selections.material = materialId;
            selections.materialName = materialName;
            
            // Clear subsequent selections
            selections.quality = null;
            selections.qualityName = '';
            selections.thickness = '';
            selections.size = '';
            selections.surface = null;
            selections.surfaceName = '';
            
            if (materialId === 'casting') {
                currentStep = 2;
                showStep(2);
            } else {
                alert('해당 소재는 아직 지원되지 않습니다.');
            }
            
            updateSummary();
        }

        function selectQuality(qualityId, qualityName) {
            selections.quality = qualityId;
            selections.qualityName = qualityName;
            
            // Clear subsequent selections
            selections.thickness = '';
            selections.size = '';
            selections.surface = null;
            selections.surfaceName = '';
            
            currentStep = 3;
            showStep(3);
            updateSummary();
        }

        function selectThickness(thickness) {
            selections.thickness = thickness;
            
            // Clear subsequent selections
            selections.size = '';
            selections.surface = null;
            selections.surfaceName = '';
            
            // Generate size options based on quality
            const sizeButtonsContainer = document.getElementById('size-buttons');
            const sizes = sizeOptions[selections.quality] || [];
            
            sizeButtonsContainer.innerHTML = '';
            sizes.forEach(size => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = size;
                button.onclick = () => selectSize(size);
                sizeButtonsContainer.appendChild(button);
            });
            
            currentStep = 4;
            showStep(4);
            updateSummary();
        }

        function selectSize(size) {
            selections.size = size;
            
            // Clear subsequent selections
            selections.surface = null;
            selections.surfaceName = '';
            
            currentStep = 5;
            showStep(5);
            updateSummary();
        }

        function selectSurface(surfaceId, surfaceName) {
            selections.surface = surfaceId;
            selections.surfaceName = surfaceName;
            
            // Show result
            document.getElementById('result-box').classList.remove('hidden');
            updateSummary();
            
            console.log('Selection completed:', selections);
        }

        function goBack() {
            if (currentStep > 1) {
                currentStep--;
                showStep(currentStep);
                document.getElementById('result-box').classList.add('hidden');
            }
        }

        // Initialize
        updateStepIndicator();
        updateSummary();
    </script>
</body>
</html>
